name: Test · analyze + flutter test

# Runs the Dart analyzer and the full test suite (incl. Trends golden/pixel
# tests) on every push and PR. Linux is the canonical platform for goldens:
# this ubuntu runner and the local `flutter` distrobox share the same prebuilt
# linux-x64 engine, so they rasterize identically. Off Linux, golden comparison
# is skipped (see test/flutter_test_config.dart) — so devs on Windows/macOS stay
# green and this job is the source of truth.
#
# IMPORTANT: the Flutter version must match the engine the committed goldens
# were generated with (the dev distrobox — currently 3.44.4). It is
# single-sourced in .fvmrc, which all four workflows read via
# flutter-version-file. When you bump Flutter, regenerate the goldens on Linux
# (`flutter test --update-goldens test/golden`) in the same version and bump
# .fvmrc.

on:
  # Every branch push runs the full suite incl. goldens — they're deterministic
  # on this runner and take seconds, so branches learn about golden breakage
  # immediately, not at merge. (A same-repo PR branch runs twice, push + PR;
  # accepted for a public repo with free minutes.)
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR supersedes the in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # The runner is on UTC (no DST), so day-math regressions around DST
      # transitions are invisible above. Re-run just the date tests in a zone
      # that actually transitions; cheap (reuses the warm build).
      - name: Test date math under a DST timezone
        run: flutter test test/date_x_test.dart test/day_trends_test.dart
        env:
          TZ: Europe/Zurich

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: test/golden/failures/
          if-no-files-found: ignore
